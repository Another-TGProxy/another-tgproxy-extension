name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y gettext gnome-shell
      # Stamp the extension version-name from the tag (v1.2.3 -> 1.2.3).
      - name: Set version from tag
        run: |
          v="${GITHUB_REF_NAME#v}"
          tmp=$(mktemp)
          jq --arg v "$v" '.["version-name"] = $v' \
            "another-tgproxy@ampernic.space/metadata.json" > "$tmp"
          mv "$tmp" "another-tgproxy@ampernic.space/metadata.json"
      - name: Pack the extension
        run: make build
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "another-tgproxy@ampernic.space.shell-extension.zip" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
