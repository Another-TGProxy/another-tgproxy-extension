name: Build

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y gettext gnome-shell
      - name: Pack the extension
        run: make build
      - uses: actions/upload-artifact@v4
        with:
          name: another-tgproxy@ampernic.space.zip
          path: another-tgproxy@ampernic.space.shell-extension.zip
          if-no-files-found: error
